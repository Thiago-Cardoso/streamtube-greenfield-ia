services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: streamtube
      POSTGRES_PASSWORD: streamtube
      POSTGRES_DB: streamtube
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamtube"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1026:1025"   # SMTP
      - "8026:8025"   # Web UI → http://localhost:8026

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console → http://localhost:9001
    environment:
      MINIO_ROOT_USER: streamtube
      MINIO_ROOT_PASSWORD: streamtube123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 streamtube streamtube123;
      mc mb --ignore-existing local/videos;
      mc mb --ignore-existing local/thumbnails;
      exit 0;
      "

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nestjs-api:
    build:
      context: ./nestjs-project
      dockerfile: Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./nestjs-project:/home/node/app
      - nestjs_modules:/home/node/app/node_modules
    ports:
      - "3100:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      APP_URL: http://localhost:3004
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: streamtube
      DB_PASSWORD: streamtube
      DB_NAME: streamtube
      JWT_SECRET: change-me-in-production
      JWT_REFRESH_SECRET: change-me-refresh-in-production
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      CONFIRMATION_TOKEN_EXPIRATION_HOURS: 1
      PASSWORD_RESET_TOKEN_EXPIRATION_HOURS: 1
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM: "StreamTube <noreply@streamtube.com>"
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: streamtube
      MINIO_SECRET_KEY: streamtube123
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_VIDEOS: videos
      MINIO_BUCKET_THUMBNAILS: thumbnails
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: sh -c "npm ci && npm run start:dev"

  video-worker:
    build:
      context: ./nestjs-project
      dockerfile: Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./nestjs-project:/home/node/app
      - nestjs_modules:/home/node/app/node_modules
    environment:
      NODE_ENV: development
      APP_URL: http://localhost:3004
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: streamtube
      DB_PASSWORD: streamtube
      DB_NAME: streamtube
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: streamtube
      MINIO_SECRET_KEY: streamtube123
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_VIDEOS: videos
      MINIO_BUCKET_THUMBNAILS: thumbnails
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: sh -c "npm ci && npm run start:worker"

  nextjs:
    build:
      context: ./nextjs-project
      dockerfile: Dockerfile.dev
    depends_on:
      - nestjs-api
    volumes:
      - ./nextjs-project:/home/node/app
      - nextjs_modules:/home/node/app/node_modules
    ports:
      - "3004:3003"
    environment:
      NODE_ENV: development
      # Browser-side: backend is reachable on the host via localhost:3100
      NEXT_PUBLIC_API_URL: http://localhost:3100
      # Server-side (Route Handlers): backend is reachable via Docker service name
      BACKEND_URL: http://nestjs-api:3000
    command: sh -c "npm ci && npm run dev"

volumes:
  db_data:
  nestjs_modules:
  nextjs_modules:
  minio_data:
  redis_data:
